# cargo-deny config — license policy + duplicate-version tracking.
# Advisories are deliberately NOT checked here: security-audit.yml already
# runs cargo-audit for that. CI runs `cargo deny check licenses bans sources`.

[graph]
# Match what CI actually builds (default members, default features).
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    "Unlicense",     # ksni (perry-ui-gtk4) — public domain
    "NCSA",          # libfuzzer-sys — permissive BSD-style
    "bzip2-1.0.6",   # libbz2-rs-sys — permissive BSD-style
    "0BSD",          # quoted_printable (lettre) — permissive, zero-clause BSD
]
confidence-threshold = 0.8
# Unpublished workspace crates (publish = false) don't need a license field.
private = { ignore = true }

[[licenses.exceptions]]
# dssim-core is AGPL-3.0, pulled only by perry-doc-tests (internal image-diff
# test tool; never linked into shipped Perry binaries). Scoped exception, not
# a global AGPL allow — if it ever reaches a shipped crate, deny goes red.
allow = ["AGPL-3.0"]
crate = "dssim-core"

[[licenses.clarify]]
# ring's license file is a concatenation cargo-deny can't classify on its own.
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Duplicate major versions are debt, not an error (rand 0.8/0.9 coexist
# until the 0.9 migration). Warn keeps them visible in CI logs.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
