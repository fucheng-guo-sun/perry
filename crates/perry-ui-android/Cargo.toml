[package]
name = "perry-ui-android"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Perry UI backend for Android (JNI bridge to Android Views)"

[lints]
workspace = true

[lib]
crate-type = ["rlib", "staticlib"]

[features]
geisterhand = []

[target.'cfg(target_os = "android")'.dependencies]
perry-ui = { path = "../perry-ui" }
perry-audio-miniaudio = { workspace = true }
perry-runtime = { path = "../perry-runtime", default-features = false }
# Issue #552: native image processing (sharp). perry-stdlib doesn't cross-compile
# to Android; perry-ext-sharp is the OpenSSL-free standalone with the same FFI
# surface (`image` crate + perry-ffi only). Force-linked via `extern crate` in
# lib.rs so libperry_ui_android.a bundles the symbols.
perry-ext-sharp = { path = "../perry-ext-sharp" }
base64.workspace = true
libc.workspace = true
jni = "0.21"
serde_json.workspace = true
itoa.workspace = true
ryu.workspace = true
tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
